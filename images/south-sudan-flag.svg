<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Black stripe -->
  <rect x="0" y="0" width="1200" height="150" fill="#000000"/>
  <!-- White stripe -->
  <rect x="0" y="150" width="1200" height="25" fill="#FFFFFF"/>
  <!-- Red stripe -->
  <rect x="0" y="175" width="1200" height="250" fill="#DD0000"/>
  <!-- White stripe -->
  <rect x="0" y="425" width="1200" height="25" fill="#FFFFFF"/>
  <!-- Green stripe -->
